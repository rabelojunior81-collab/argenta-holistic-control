# Expertise Matrix — Roteamento Inteligente para Argenta Fênix
# v4.1 — 2026-03-07 | PRIORIDADE: kimi-for-coding → bailian-coding-plan → github-copilot
#
# Política de Prioridade (AJUSTADO):
#   1. kimi-for-coding (Kimi K2.5) — MESMO do The Forge, prioridade máxima
#   2. bailian-coding-plan (Alibaba) — subscription existente
#   3. github-copilot — terceira opção
#   EVITAR: opencode, kilo (gate) — usar apenas se outros falharem
#
# Agentes Kilo disponíveis (GET /agent):
#   code         → default, executa ferramentas, edita código
#   plan         → planejamento, proibido editar arquivos
#   debug        → diagnóstico sistemático de bugs
#   orchestrator → orquestra sub-agentes em paralelo
#   ask          → pesquisa e respostas, somente leitura

version: 4

policy:
  fallback_on_error: true
  log_routing_decision: true

domains:

  # ── PLANNING ─────────────────────────────────────────────────────────────────
  planning:
    agent: orchestrator
    providerID: kimi-for-coding
    modelID: kimi-k2-thinking
    rationale: "Orchestrator + Kimi K2 Thinking — raciocínio sistêmico (MESMO do Forge)"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── EXECUTION ────────────────────────────────────────────────────────────────
  execution:
    agent: code
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente code + Kimi K2.5 — implementação (MESMO do Forge)"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── AUDIT ────────────────────────────────────────────────────────────────────
  audit:
    agent: ask
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente ask + Kimi K2.5 — análise crítica (MESMO do Forge)"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── RESEARCH ─────────────────────────────────────────────────────────────────
  research:
    agent: ask
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente ask + Kimi K2.5 — pesquisa (MESMO do Forge)"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── QUICK ────────────────────────────────────────────────────────────────────
  quick:
    agent: code
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente code + Qwen3-Turbo — baixa latência, custo mínimo, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: glm-4.5-flash

  # ── REVIEW ───────────────────────────────────────────────────────────────────
  review:
    agent: ask
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente ask + Qwen3-Coder-Plus — revisão de código, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: kimi-k2-thinking

  # ── SYNTHESIS ────────────────────────────────────────────────────────────────
  synthesis:
    agent: ask
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente ask + Qwen3.5-Plus — síntese e redação, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── REASONING ────────────────────────────────────────────────────────────────
  reasoning:
    agent: plan
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente plan + Qwen3.5-Plus — raciocínio profundo, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: kimi-k2-thinking

  # ── DEBUG ─────────────────────────────────────────────────────────────────────
  debug:
    agent: debug
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente debug + Qwen3-Coder-Plus — diagnóstico, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── CREATIVE ─────────────────────────────────────────────────────────────────
  creative:
    agent: code
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Agente code + Qwen3.5-Plus — criatividade, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: qwen3.5-plus

  # ── LOCAL ────────────────────────────────────────────────────────────────────
  local:
    agent: code
    providerID: kimi-for-coding
    modelID: k2p5
    rationale: "Qwen3-Turbo — tarefas locais rápidas, usar subscription"
    fallback:
      providerID: bailian-coding-plan
      modelID: glm-4.5-flash

# ── Default ───────────────────────────────────────────────────────────────────
default:
  agent: code
  providerID: kimi-for-coding
  modelID: k2p5
  rationale: "Padrão: Alibaba (subscription) → Kimi → outros"
  fallback:
    providerID: kimi-for-coding
    modelID: k2p5
  tertiary:
    providerID: github-copilot
    modelID: claude-sonnet-4.6
